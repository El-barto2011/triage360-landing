<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <title>TRIAGE360</title>
  <style>
    @keyframes dibujar { from { stroke-dashoffset: 62.2; } to { stroke-dashoffset: 0; } }
    @keyframes aparecer { from { opacity: 0; transform: scale(.5); } to { opacity: 1; transform: scale(1); } }
    /* Estado base = visible. La animación oculta solo al inicio (fill backwards):
       si el navegador no anima, el logo igual se ve completo. */
    /* Sin fill backwards: si el navegador no anima, todo queda visible estático. */
    .arco { stroke-dasharray: 62.2; stroke-dashoffset: 0; animation: dibujar .5s ease-out; }
    .a2 { animation-delay: .4s; }
    .a3 { animation-delay: .8s; }
    .cruz { transform-box: fill-box; transform-origin: center; animation: aparecer .35s cubic-bezier(.34,1.56,.64,1) 1.2s; }
    @media (prefers-reduced-motion: reduce) {
      .arco, .cruz { animation: none; }
    }
  </style>
  <g>
      <path class="arco" d="M 50 16 A 34 34 0 0 1 82.92 58.51" fill="none" stroke="#22C55E" stroke-width="10" stroke-linecap="round"/>
      <path class="arco a2" d="M 79.44 67 A 34 34 0 0 1 26.17 74.25" fill="none" stroke="#FBBF24" stroke-width="10" stroke-linecap="round"/>
      <path class="arco a3" d="M 20.56 67 A 34 34 0 0 1 40.92 17.24" fill="none" stroke="#EF4444" stroke-width="10" stroke-linecap="round"/>
  </g>
  <g class="cruz">
    <rect x="37" y="44" width="26" height="13" rx="3.5" fill="#0E7C6E"/>
    <rect x="43.5" y="37.5" width="13" height="26" rx="3.5" fill="#0E7C6E"/>
  </g>
</svg>
